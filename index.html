<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
    <script>
      const LIFF_ID = "2009961909-HZiaQUsh";
      const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSd6VJ7qG3JmUk87jF7rXt__dMtuGOWpVejZlksFxRwSPOucMA/viewform?usp=pp_url&entry.1781354897=";

      document.addEventListener("DOMContentLoaded", function() {
        liff.init({ liffId: LIFF_ID })
          .then(() => {
            if (!liff.isLoggedIn()) {
              liff.login();
            } else {
              liff.getProfile().then(p => {
                const url = FORM_URL + encodeURIComponent(p.userId);
                log("リダイレクト先: " + url);
                setTimeout(() => {
                  log("リダイレクト実行");
                  window.location.replace(url);
                }, 2000);
              });
            }
          });
      });

      function log(msg) {
        document.getElementById("log").innerHTML += msg + "<br>";
      }
    </script>
  </head>
  <body>
    <div id="log" style="padding:20px;font-size:14px;"></div>
  </body>
</html>
