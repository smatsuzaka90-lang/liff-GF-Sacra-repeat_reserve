<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
    <script>
      const LIFF_ID = "2009961909-HZiaQUsh";

      document.addEventListener("DOMContentLoaded", function() {
        log("起動");

        liff.init({ liffId: LIFF_ID })
          .then(() => {
            log("初期化OK");
            log("ログイン状態: " + liff.isLoggedIn());
            log("環境: " + (liff.isInClient() ? "LINE内" : "外部ブラウザ"));

            if (!liff.isLoggedIn()) {
              log("ログイン試行中...");
              liff.login();
            } else {
              liff.getProfile().then(p => {
                log("UserID取得: " + p.userId);
              }).catch(err => {
                log("getProfile失敗: " + err);
              });
            }
          })
          .catch(err => {
            log("初期化失敗: " + JSON.stringify(err));
          });
      });

      function log(msg) {
        document.getElementById("log").innerHTML += msg + "<br>";
      }
    </script>
  </head>
  <body>
    <div id="log" style="padding:20px;font-size:14px;"></div>
  </body>
</html>
