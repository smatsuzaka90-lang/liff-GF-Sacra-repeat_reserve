<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
    <script>
      const LIFF_ID = "2009961909-HZiaQUsh";
      const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSd6VJ7qG3JmUk87jF7rXt__dMtuGOWpVejZlksFxRwSPOucMA/viewform?usp=pp_url&entry.1781354897=";

      document.addEventListener("DOMContentLoaded", function() {
        liff.init({ liffId: LIFF_ID })
          .then(() => {
            if (!liff.isLoggedIn()) {
              liff.login();
            } else {
              liff.getProfile().then(p => {
                const url = FORM_URL + encodeURIComponent(p.userId);
                liff.openWindow({
                  url: url,
                  external: true
                });
              });
            }
          });
      });
    </script>
  </head>
  <body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:#999;">
    <p>予約画面へ移動中...</p>
  </body>
</html>
